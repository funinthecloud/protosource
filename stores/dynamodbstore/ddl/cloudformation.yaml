AWSTemplateFormatVersion: "2010-09-09"
Description: DynamoDB tables for protosource event sourcing

# Attribute name mapping (single-char to minimize per-item byte costs):
#   a = partition key (aggregate ID, string)
#   v = sort key (version number, numeric)
#   d = data payload (binary)
#   t = TTL epoch seconds (numeric, optional)

Resources:
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: events
      KeySchema:
        - AttributeName: a
          KeyType: HASH
        - AttributeName: v
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: a
          AttributeType: S
        - AttributeName: v
          AttributeType: N
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: t
        Enabled: true

  AggregatesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: aggregates
      KeySchema:
        - AttributeName: a
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: a
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
