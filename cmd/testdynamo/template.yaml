AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TestDynamo - protosource test aggregate backed by DynamoDB

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: provided.al2023
    Architectures:
      - arm64

Parameters:
  EventsTableName:
    Type: String
    Default: events
  AggregatesTableName:
    Type: String
    Default: aggregates
  DomainName:
    Type: String
    Default: test-v1.api.drhayt.com
  CertificateArn:
    Type: String
    Default: arn:aws:acm:us-east-1:610753221705:certificate/6230f95b-f703-4ef1-8093-6bebf9d81768
  HostedZoneId:
    Type: String
    Default: Z0894234ZRMO39K6SNNA

Resources:
  # DynamoDB tables are created/managed by testdynamo-setup CLI, not CloudFormation.
  # The Lambda references them by name via environment variables.

  TestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      BinaryMediaTypes:
        - "*/*"
      Domain:
        DomainName: !Ref DomainName
        CertificateArn: !Ref CertificateArn
        EndpointConfiguration: EDGE
        Route53:
          HostedZoneId: !Ref HostedZoneId

  TestDynamoFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      CodeUri: .
      Handler: bootstrap
      Environment:
        Variables:
          EVENTS_TABLE: !Ref EventsTableName
          AGGREGATES_TABLE: !Ref AggregatesTableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref AggregatesTableName
      Events:
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref TestApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  CustomDomainUrl:
    Description: Custom domain URL
    Value: !Sub https://${DomainName}/
  ApiUrl:
    Description: API Gateway endpoint URL (fallback)
    Value: !Sub https://${TestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt TestDynamoFunction.Arn
