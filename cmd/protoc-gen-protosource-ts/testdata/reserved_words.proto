syntax = "proto3";

package test.reserved_words;

option go_package = "github.com/funinthecloud/protosource/test/reserved_words;reservedwords";

import "funinthecloud/protosource/options/v1/options_v1.proto";

option (funinthecloud.protosource.options.v1.protosource_file).enabled = true;

message Thing {
  option (funinthecloud.protosource.options.v1.protosource_message_type).aggregate = {};
  string id      = 1;
  int64  version = 2;
  string function = 3;
  string class    = 4;
}

message Create {
  option (funinthecloud.protosource.options.v1.protosource_message_type).command = {
    produces_events: [ "Created" ]
    lifecycle: COMMAND_LIFECYCLE_CREATION
  };
  string id    = 1;
  string actor = 2;
}

message SetFunction {
  option (funinthecloud.protosource.options.v1.protosource_message_type).command = {
    produces_events: [ "FunctionSet" ]
    lifecycle: COMMAND_LIFECYCLE_MUTATION
  };
  string id       = 1;
  string actor    = 2;
  string function = 3;
  string class    = 4;
}

message Created {
  option (funinthecloud.protosource.options.v1.protosource_message_type).event = {};
  string id      = 1;
  int64  version = 2;
  int64  at      = 3;
  string actor   = 4;
}

message FunctionSet {
  option (funinthecloud.protosource.options.v1.protosource_message_type).event = {};
  string id       = 1;
  int64  version  = 2;
  int64  at       = 3;
  string actor    = 4;
  string function = 5;
  string class    = 6;
}
