syntax = "proto3";

package test.collection_valid;

option go_package = "github.com/funinthecloud/protosource/test/collection_valid;collectionvalidpb";

import "funinthecloud/protosource/options/v1/options_v1.proto";

option (funinthecloud.protosource.options.v1.protosource_file).enabled = true;

enum State {
  STATE_UNSPECIFIED = 0;
  STATE_ACTIVE      = 1;
}

message Basket {
  option (funinthecloud.protosource.options.v1.protosource_message_type).aggregate = {};
  string          id        = 1;
  int64           version   = 2;
  int64           create_at = 3;
  string          create_by = 4;
  int64           modify_at = 5;
  string          modify_by = 6;
  State           state     = 7;
  repeated Widget widgets   = 8;
}

message Widget {
  string widget_id   = 1;
  string label       = 2;
  int64  weight_grams = 3;
}

message Create {
  option (funinthecloud.protosource.options.v1.protosource_message_type).command = {
    produces_events: ["Created"]
    lifecycle: COMMAND_LIFECYCLE_CREATION
  };
  string id    = 1;
  string actor = 2;
}

message AddWidget {
  option (funinthecloud.protosource.options.v1.protosource_message_type).command = {
    produces_events: ["WidgetAdded"]
    lifecycle: COMMAND_LIFECYCLE_MUTATION
    allowed_states: ["STATE_ACTIVE"]
  };
  string id     = 1;
  string actor  = 2;
  Widget widget = 3;
}

message RemoveWidget {
  option (funinthecloud.protosource.options.v1.protosource_message_type).command = {
    produces_events: ["WidgetRemoved"]
    lifecycle: COMMAND_LIFECYCLE_MUTATION
    allowed_states: ["STATE_ACTIVE"]
  };
  string id        = 1;
  string actor     = 2;
  string widget_id = 3;
}

message Created {
  option (funinthecloud.protosource.options.v1.protosource_message_type).event = {
    sets_state: "STATE_ACTIVE"
  };
  string id      = 1;
  int64  version = 2;
  int64  at      = 3;
  string actor   = 4;
}

message WidgetAdded {
  option (funinthecloud.protosource.options.v1.protosource_message_type).event = {
    collection: { target: "widgets", action: COLLECTION_ACTION_ADD }
  };
  string id      = 1;
  int64  version = 2;
  int64  at      = 3;
  string actor   = 4;
  Widget widget  = 5;
}

message WidgetRemoved {
  option (funinthecloud.protosource.options.v1.protosource_message_type).event = {
    collection: { target: "widgets", action: COLLECTION_ACTION_REMOVE, key_field: "widget_id" }
  };
  string id        = 1;
  int64  version   = 2;
  int64  at        = 3;
  string actor     = 4;
  string widget_id = 5;
}
