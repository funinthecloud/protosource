syntax = "proto3";

package test.valid;

option go_package = "github.com/funinthecloud/protosource/test/valid;validpb";

import "funinthecloud/protosource/options/v1/options_v1.proto";

option (funinthecloud.protosource.options.v1.protosource_file).enabled = true;

enum State {
  STATE_UNSPECIFIED = 0;
  STATE_ACTIVE      = 1;
  STATE_LOCKED      = 2;
}

message Thing {
  option (funinthecloud.protosource.options.v1.protosource_message_type).aggregate = {};
  string id      = 1;
  int64  version = 2;
  int64  create_at = 3;
  string create_by = 4;
  int64  modify_at = 5;
  string modify_by = 6;
  State  state   = 7;
}

message Create {
  option (funinthecloud.protosource.options.v1.protosource_message_type).command = {
    produces_events: ["Created", "Activated"]
    lifecycle: COMMAND_LIFECYCLE_CREATION
  };
  string id    = 1;
  string actor = 2;
}

message Lock {
  option (funinthecloud.protosource.options.v1.protosource_message_type).command = {
    produces_events: ["Locked"]
    lifecycle: COMMAND_LIFECYCLE_MUTATION
    allowed_states: ["STATE_ACTIVE"]
  };
  string id    = 1;
  string actor = 2;
}

message Created {
  option (funinthecloud.protosource.options.v1.protosource_message_type).event = {};
  string id      = 1;
  int64  version = 2;
  int64  at      = 3;
  string actor   = 4;
}

message Activated {
  option (funinthecloud.protosource.options.v1.protosource_message_type).event = {
    sets_state: "STATE_ACTIVE"
  };
  string id      = 1;
  int64  version = 2;
  int64  at      = 3;
  string actor   = 4;
}

message Locked {
  option (funinthecloud.protosource.options.v1.protosource_message_type).event = {
    sets_state: "STATE_LOCKED"
  };
  string id      = 1;
  int64  version = 2;
  int64  at      = 3;
  string actor   = 4;
}
