syntax = "proto3";

package test.projection_map_value_mismatch;

option go_package = "github.com/funinthecloud/protosource/test/projection_map_value_mismatch;projmapvalmismatchpb";

import "funinthecloud/protosource/options/v1/options_v1.proto";

option (funinthecloud.protosource.options.v1.protosource_file).enabled = true;

message Widget {
  string widget_id = 1;
  string label     = 2;
}

message Gadget {
  string gadget_id = 1;
  string name      = 2;
}

message Basket {
  option (funinthecloud.protosource.options.v1.protosource_message_type).aggregate = {};
  string              id        = 1;
  int64               version   = 2;
  int64               create_at = 3;
  string              create_by = 4;
  int64               modify_at = 5;
  string              modify_by = 6;
  map<string, Widget> widgets   = 7;
}

// Projection has map<string, Gadget> but aggregate has map<string, Widget>.
message BasketView {
  option (funinthecloud.protosource.options.v1.protosource_message_type).projection = {};
  string              id      = 1;
  map<string, Gadget> widgets = 2;
}

message Create {
  option (funinthecloud.protosource.options.v1.protosource_message_type).command = {
    produces_events: ["Created"]
    lifecycle: COMMAND_LIFECYCLE_CREATION
  };
  string id    = 1;
  string actor = 2;
}

message Created {
  option (funinthecloud.protosource.options.v1.protosource_message_type).event = {};
  string id      = 1;
  int64  version = 2;
  int64  at      = 3;
  string actor   = 4;
}
